<title>Escritura de Constitución — CC3115</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Papel protocolo tokens (escritura_sa only) ── */
:root{--paper:#EDE5D0;--paper-txt:#0F0C08;--stamp:#1A3A5C;--lnum:#9A8F7A}

/* ── PAPEL PROTOCOLO ── */
.hoja{width:min(780px,97vw);background:var(--paper);box-shadow:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);font-family:'Times New Roman',Times,serif;color:var(--paper-txt);position:relative;flex-shrink:0}
.h-top{padding:9mm 10mm 0;display:grid;grid-template-columns:42px 1fr 36px;align-items:start;gap:5px}
.h-seal-l{font-size:6.5px;color:var(--stamp);font-weight:700;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;opacity:.7;padding-top:2px}
.h-sc{text-align:center}
.h-sb{display:inline-flex;flex-direction:column;align-items:center;border:2.5px solid var(--paper-txt);padding:3px 18px 4px;position:relative;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(0,0,0,.045) 2px,rgba(0,0,0,.045) 3px),repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(0,0,0,.035) 2px,rgba(0,0,0,.035) 3px)}
.h-sb::before,.h-sb::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(0,0,0,.18) 0%,transparent 70%);border-radius:50% 10% 50% 10%}
.h-sb::before{left:-24px;transform:translateY(-50%) scaleX(-1)}.h-sb::after{right:-24px;transform:translateY(-50%)}
.h-sb-no{font-size:6.5px;font-family:'Courier New',monospace;font-weight:700;letter-spacing:.08em;color:rgba(0,0,0,.6);align-self:flex-start;line-height:1}
.h-sn{font-family:'Courier New',monospace;font-size:16px;font-weight:700;letter-spacing:.1em;line-height:1.1}
.h-ss{font-size:5.5px;letter-spacing:.08em;text-transform:uppercase;color:#6A5E4A;margin-top:2px}
.h-r{width:28px;height:28px;border:2.5px solid var(--paper-txt);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;font-family:serif;margin-left:auto;margin-top:2px}
.h-pl{text-align:center;font-size:22px;font-weight:900;letter-spacing:.18em;padding:2.5mm 12mm 0;display:flex;justify-content:center;align-items:baseline;gap:10px;font-family:'Times New Roman',serif}
.h-pn{border-bottom:2px solid var(--paper-txt);padding-bottom:1px;min-width:34px;display:inline-block;text-align:center;font-size:22px}
.h-body{position:relative;padding:3mm 20mm 2mm 37mm}
.h-mg{position:absolute;left:3mm;top:3mm;width:33mm;font-size:8.5px;color:var(--stamp);font-weight:700;font-family:'Courier New',monospace;line-height:1.8;letter-spacing:.04em}
.h-mg .ml{display:block;font-size:10px;letter-spacing:.22em;margin-bottom:2px;color:var(--stamp)}
.h-mg .mn{font-size:9.5px;display:block}
.h-mg .mq{font-size:7.5px;color:#527090;margin-top:4px;line-height:1.6;letter-spacing:.04em}
.h-lines{width:100%}
.pl{display:flex;min-height:5.6mm;border-bottom:.5px solid rgba(160,145,120,.35);align-items:baseline}
.pln{width:24px;min-width:24px;font-family:'Courier New',monospace;font-size:7.5px;color:var(--lnum);text-align:right;padding-right:5px;user-select:none;flex-shrink:0;padding-top:1px}
.plt{flex:1;font-size:10pt;line-height:1.38;color:var(--paper-txt);text-align:justify;padding:0 1px;word-break:break-word;hyphens:auto}
.plt strong{font-weight:700}
.h-ft{padding:0mm 10mm 4mm;margin-top:-8mm;display:flex;justify-content:flex-end}
.h-ft-empty{padding-bottom:6mm}
.h-sig{text-align:center}
.h-sl{border-top:1px solid var(--paper-txt);width:155px;margin:0 auto 2px}
.h-sn2{font-size:7.5pt;font-style:italic;font-family:'Times New Roman',serif;color:var(--paper-txt)}
.h-st{font-size:6.5pt;color:#6A5A44}
.shared-val{padding:.48rem .7rem;background:rgba(74,158,219,.06);border:1px solid rgba(74,158,219,.2);color:var(--ui-text);font-size:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.shared-lnk{font-size:.7rem;color:var(--acc-l);text-decoration:none;opacity:.75}
.shared-lnk:hover{opacity:1}
.shared-info{font-size:.76rem;color:var(--ui-muted);padding:.45rem .7rem;background:rgba(74,158,219,.05);border:1px solid rgba(74,158,219,.15);margin-bottom:.65rem}
.shared-info a{color:var(--acc);text-decoration:none;margin-left:.5rem}
.h-sig-img{display:block;margin:0 auto 1mm;max-height:18mm;max-width:45mm;object-fit:contain}
.h-sat{position:absolute;bottom:13mm;left:5mm;opacity:.5}
.sat-seal{width:58px;height:58px;border-radius:50%;border:2px solid var(--stamp);display:flex;align-items:center;justify-content:center;position:relative;font-family:'Courier New',monospace}
.sat-inner{font-size:6.5px;font-weight:700;color:var(--stamp);text-align:center;line-height:1.4;padding:2px}

@media print{
  body,#pv>.ptb,#layout{background:transparent}
  #layout,#pv>.ptb{display:none!important}
  #pv{display:block!important}
  .pc{background:#fff;padding:0;gap:0;min-height:0}
  .hoja{width:100%;box-shadow:none;page-break-after:always;break-after:page}
  @page{size:215mm 330mm;margin:0}
}
</style>

<!-- FORM -->
<div id="layout">
  <nav class="sb">
    <a class="sb-brand" href="index.html" style="text-decoration:none;display:block">Company<br>Sim</a>
    <div class="sb-section">Fases S.A.</div>
    <div class="sb-item act"><span class="sb-dot"></span>Escritura</div>
    <div class="sb-item lock"><span class="sb-dot"></span>Registro RM</div>
    <div class="sb-item lock"><span class="sb-dot"></span>Acciones</div>
    <div class="sb-item lock"><span class="sb-dot"></span>RTU / SAT</div>
    <div class="sb-item lock"><span class="sb-dot"></span>Libros</div>
  </nav>
  <div id="fv">
    <div class="fh">
      <div class="ey">CC3115 · Producción y Negocios de Videojuegos</div>
      <h1>Escritura de Constitución de S.A.</h1>
      <p>Completá los datos para generar el documento en papel protocolo</p>
    </div>
    <div class="prog" id="prog"></div>
    <div id="steps"></div>
  </div>
</div>

<!-- PREVIEW -->
<div id="pv">
  <div class="ptb">
    <button class="btn-bk" onclick="goBack()">← Editar</button>
    <div style="margin-left:.5rem">
      <div class="ptb-t" id="ptb-t"></div>
      <div class="ptb-s" id="ptb-s"></div>
    </div>
    <button class="btn-pr" onclick="window.print()">Imprimir / PDF</button>
    <a class="btn-pr" href="registro_rm.html" style="text-decoration:none;background:var(--act)">Continuar proceso →</a>
  </div>
  <div class="pc" id="pc"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let step=1;
const SOCIO_EJ=['JAVIER ANTONIO LÓPEZ RAMÍREZ','MARÍA JIMENA RUANO MARROQUÍN'];
let socios=[
  {id:1,nombre:'',edad:'22',trato:'señor',civil:'soltero',prof:'Estudiante',cui:'',nac:'guatemalteco',acc:3},
  {id:2,nombre:'',edad:'22',trato:'señorita',civil:'soltero',prof:'Estudiante',cui:'',nac:'guatemalteca',acc:2}
];
let nid=3, adminId=1;

const shared=JSON.parse(localStorage.getItem('companysim')||'null');

// Persists values from each step when the DOM is swapped
const st={
  empresa:'',actAdd:'',chkAdd:false,chkRep:false,objCustom:'',
  valNom:1000,capAut:10000,dpto:'Guatemala',dir:'18 avenida 11-95 zona 15 Vista Hermosa III',
  durAdm:'tres (3) años',notario:'CLAUDE ELIÉ RIVERA',tratoNot:'notario'
};
if(shared){st.empresa=shared.nombre||'';st.dpto=shared.dpto||'Guatemala';st.dir=shared.dir||st.dir;}

function saveStep(n){
  if(n===1){
    if(!shared) st.empresa=document.getElementById('empresa')?.value.trim().toUpperCase()||st.empresa;
    st.chkAdd=document.getElementById('chk_add')?.checked||false;
    st.chkRep=document.getElementById('chk_rep')?.checked||false;
    st.actAdd=st.chkAdd?(document.getElementById('act_add')?.value.trim()||''):'';
    st.objCustom=st.chkRep?(document.getElementById('obj_custom')?.value.trim()||''):'';
  }
  if(n===2){
    // socios array already kept in sync via oninput handlers
  }
  if(n===3){
    st.valNom=parseInt(document.getElementById('val_nom')?.value)||st.valNom;
    st.capAut=parseInt(document.getElementById('cap_aut')?.value)||st.capAut;
    socios.forEach(s=>{const e=document.getElementById('acc_'+s.id);if(e)s.acc=parseInt(e.value)||1;});
    if(!shared){
      st.dpto=document.getElementById('dpto')?.value.trim()||st.dpto;
      st.dir=document.getElementById('dir')?.value.trim()||st.dir;
    }
    st.durAdm=document.getElementById('dur_adm')?.value||st.durAdm;
  }
  if(n===4){
  }
}

// ── PROGRESS ───────────────────────────────────────────────────
const SL=['La Empresa','Los Socios','Capital y Sede','Fecha y Notaría'];
function renderProg(){
  document.getElementById('prog').innerHTML=SL.map((_,i)=>{
    const n=i+1,c=n<step?'done':n===step?'act':'';
    return `<div class="ps ${c}"></div>`;
  }).join('');
}

// ── STEP HTML ─────────────────────────────────────────────────
function s1html(){return `
<span class="slbl">Paso 1 de 3 — La Empresa</span>
<div class="card">
  <div class="ctitle">Identidad de la empresa</div>
  ${shared
    ?`<div class="f"><label>Empresa</label><div class="shared-val">${st.empresa}, SOCIEDAD ANÓNIMA<a class="shared-lnk" href="index.html">← cambiar</a></div></div>`
    :`<div class="f"><label>Nombre de la empresa</label><input id="empresa" type="text" placeholder="ej. PIXEL STORM" value="${st.empresa}" oninput="this.value=this.value.toUpperCase()"><div class="hint">Se registrará como "[NOMBRE], SOCIEDAD ANÓNIMA"</div></div>`}
  <div class="f">
    <label>Objeto de la empresa</label>
    <div class="obj-default">
      <span class="obj-lbl">Objeto predeterminado — desarrollo de videojuegos</span>
      <span class="obj-item"><span class="obj-key">a)</span>Desarrollo y comercialización de videojuegos, software interactivo y aplicaciones digitales;</span>
      <span class="obj-item"><span class="obj-key">b)</span>Exportación, importación, comercialización y licenciamiento de videojuegos y software;</span>
      <span class="obj-item"><span class="obj-key">c)</span>Prestación de servicios de desarrollo, diseño, arte y producción de videojuegos;</span>
      <span class="obj-item"><span class="obj-key">d)</span>Consultoría y capacitación en desarrollo de videojuegos e industrias creativas;</span>
      <span class="obj-item"><span class="obj-key">e)</span>Investigación y desarrollo de nuevas mecánicas, tecnologías y productos de software interactivo;</span>
      <span class="obj-item"><span class="obj-key">f)</span>Producción, publicación y comercialización de materiales gráficos, audio y video relacionados con videojuegos;</span>
      <span class="obj-item"><span class="obj-key">…)</span>Cualquier otra actividad subsidiaria, conexa o complementaria a las anteriores.</span>
    </div>
    <label class="obj-opt" id="opt-add" onclick="toggleObj('add',this)">
      <input type="checkbox" id="chk_add" onclick="event.stopPropagation();toggleObj('add',document.getElementById('opt-add'))">
      <div class="obj-opt-body">
        <span class="obj-opt-label">Agregar una actividad al final</span>
        <span class="obj-opt-hint">Se insertará como inciso adicional antes de la cláusula de cierre</span>
      </div>
    </label>
    <div id="area-add" class="obj-expand" style="display:none">
      <textarea id="act_add" placeholder="ej. Operación de torneos y eventos de esports en Guatemala y el extranjero"></textarea>
    </div>
    <label class="obj-opt" id="opt-rep" onclick="toggleObj('rep',this)">
      <input type="checkbox" id="chk_rep" onclick="event.stopPropagation();toggleObj('rep',document.getElementById('opt-rep'))">
      <div class="obj-opt-body">
        <span class="obj-opt-label">Reemplazar el objeto completo</span>
        <span class="obj-opt-hint">Escribí el objeto desde cero — el predeterminado no se incluirá</span>
      </div>
    </label>
    <div id="area-rep" class="obj-expand" style="display:none">
      <textarea id="obj_custom" placeholder="a) Tu actividad principal; b) Otra actividad; c) Cualquier otra actividad subsidiaria o conexa a las anteriores." style="min-height:110px"></textarea>
    </div>
  </div>
</div>
<div class="nav"><button class="btn-n" onclick="nextStep()">Continuar →</button></div>`;}

function s2html(){return `
<span class="slbl">Paso 2 de 3 — Los Socios</span>
<div id="socio-cards"></div>
<button class="btn-add" onclick="addSocio()">+ Agregar socio</button>
<div class="nav">
  <button class="btn-p" onclick="prevStep()">← Atrás</button>
  <button class="btn-n" onclick="nextStep()">Continuar →</button>
</div>`;}

function s3html(){
  const rows=socios.map((s,i)=>`
<div class="f">
  <label>${s.nombre||'Socio '+(i+1)} — Acciones</label>
  <input type="number" min="1" max="999" value="${s.acc}" id="acc_${s.id}" oninput="updateCap()">
</div>`).join('');
  return `
<span class="slbl">Paso 3 de 3 — Capital y Sede</span>
<div class="card">
  <div class="ctitle">Capital social</div>
  <div class="r2">
    <div class="f">
      <label>Valor nominal por acción (Q.)</label>
      <input type="number" id="val_nom" value="${st.valNom}" min="100" step="100" oninput="updateCap()">
    </div>
    <div class="f">
      <label>Capital autorizado (Q.)</label>
      <input type="number" id="cap_aut" value="${st.capAut}" min="1000" step="1000" oninput="updateCap()">
      <div class="hint">Puede ser mayor al capital suscrito por los socios</div>
    </div>
  </div>
  <div class="ctitle" style="margin-top:.75rem">Acciones por socio</div>
  ${rows}
  <div class="capbox" id="capbox">—</div>
</div>
${shared
  ?`<div class="shared-info">Domicilio: ${st.dpto}&ensp;·&ensp;${st.dir||'(sin dirección)'} <a href="index.html">cambiar</a></div>`
  :`<div class="card"><div class="ctitle">Domicilio</div>
  <div class="f"><label>Departamento</label><input id="dpto" value="${st.dpto}"></div>
  <div class="f"><label>Dirección de la sede</label><input id="dir" value="${st.dir}" placeholder="ej. 10 calle 15-20, zona 10, Ciudad de Guatemala"></div>
</div>`}
<div class="card">
  <div class="ctitle">Administrador único y representante legal</div>
  <div class="adm-grp" id="adm-grp"></div>
  <div class="f" style="margin-top:.85rem">
    <label>Duración del cargo</label>
    <select id="dur_adm">
      <option value="un (1) año">1 año</option>
      <option value="dos (2) años">2 años</option>
      <option value="tres (3) años" selected>3 años</option>
      <option value="cuatro (4) años">4 años</option>
      <option value="cinco (5) años">5 años</option>
    </select>
  </div>
</div>
<div class="nav">
  <button class="btn-p" onclick="prevStep()">← Atrás</button>
  <button class="btn-g" onclick="generate()">Generar escritura →</button>
</div>`;}

// ── OBJETO TOGGLE ─────────────────────────────────────────────
function toggleObj(mode, el){
  const chkAdd=document.getElementById('chk_add');
  const chkRep=document.getElementById('chk_rep');
  const areaAdd=document.getElementById('area-add');
  const areaRep=document.getElementById('area-rep');
  const optAdd=document.getElementById('opt-add');
  const optRep=document.getElementById('opt-rep');
  if(mode==='add'){
    const on=!chkAdd.checked;
    chkAdd.checked=on;
    if(on){chkRep.checked=false;areaRep.style.display='none';optRep.classList.remove('on');}
    areaAdd.style.display=on?'block':'none';
    el.classList.toggle('on',on);
  } else {
    const on=!chkRep.checked;
    chkRep.checked=on;
    if(on){chkAdd.checked=false;areaAdd.style.display='none';optAdd.classList.remove('on');}
    areaRep.style.display=on?'block':'none';
    el.classList.toggle('on',on);
  }
}

// ── SOCIO CARDS ────────────────────────────────────────────────
function renderSocios(){
  const c=document.getElementById('socio-cards');
  if(!c) return;
  c.innerHTML=socios.map((s,i)=>`
<div class="sc">
  <div class="sc-h">
    <span class="sc-t">Socio ${i+1}</span>
    ${socios.length>2?`<button class="btn-rm" onclick="rmSocio(${s.id})">Eliminar</button>`:''}
  </div>
  <div class="f">
    <label>Nombre completo</label>
    <input type="text" value="${s.nombre}" placeholder="ej. ${SOCIO_EJ[i]||'NOMBRE COMPLETO'}"
      style="text-transform:uppercase"
      oninput="socios[${i}].nombre=this.value.toUpperCase();this.value=this.value.toUpperCase()">
  </div>
  <div class="r3">
    <div class="f"><label>Tratamiento</label>
      <select onchange="socios[${i}].trato=this.value;socios[${i}].nac=this.value==='señor'?'guatemalteco':'guatemalteca';renderSocios()">
        <option value="señor" ${s.trato==='señor'?'selected':''}>Señor</option>
        <option value="señorita" ${s.trato==='señorita'?'selected':''}>Señorita</option>
        <option value="señora" ${s.trato==='señora'?'selected':''}>Señora</option>
      </select>
    </div>
    <div class="f"><label>Edad</label><input type="number" value="${s.edad}" min="18" max="99" oninput="socios[${i}].edad=this.value"></div>
    <div class="f"><label>Estado civil</label>
      <select onchange="socios[${i}].civil=this.value">
        <option value="soltero" ${s.civil==='soltero'?'selected':''}>Soltero/a</option>
        <option value="casado" ${s.civil==='casado'?'selected':''}>Casado/a</option>
      </select>
    </div>
  </div>
  <div class="r2">
    <div class="f"><label>Profesión</label><input value="${s.prof}" oninput="socios[${i}].prof=this.value"></div>
    <div class="f"><label>Nacionalidad</label>
      <input value="${s.nac}" placeholder="${s.trato==='señor'?'guatemalteco':'guatemalteca'}" oninput="socios[${i}].nac=this.value">
    </div>
  </div>
  <div class="f">
    <label>CUI (DPI)</label>
    <input value="${s.cui}" placeholder="ej. 1234 56789 0101" oninput="socios[${i}].cui=this.value">
    <div class="hint">Para el ejercicio pueden usar un número ficticio</div>
  </div>
</div>`).join('');
}

function addSocio(){
  if(socios.length>=5) return;
  socios.push({id:nid++,nombre:'',edad:'22',trato:'señor',civil:'soltero',prof:'Estudiante',cui:'',nac:'guatemalteco',acc:1});
  renderSocios();
}
function rmSocio(id){
  if(socios.length<=2) return;
  socios=socios.filter(s=>s.id!==id);
  if(adminId===id) adminId=socios[0].id;
  renderSocios();
}

// ── CAPITAL ────────────────────────────────────────────────────
function updateCap(){
  const vn=parseInt(document.getElementById('val_nom')?.value)||1000;
  const ca=parseInt(document.getElementById('cap_aut')?.value)||10000;
  socios.forEach(s=>{const e=document.getElementById('acc_'+s.id);if(e)s.acc=parseInt(e.value)||1;});
  const ts=socios.reduce((a,s)=>a+s.acc,0);
  const tSus=ts*vn, tAut=Math.floor(ca/vn);
  const box=document.getElementById('capbox');
  if(!box) return;
  const rows=socios.map(s=>`${s.nombre||'Socio '+s.id}: ${s.acc} acción${s.acc!==1?'es':''} = Q.${fmt(s.acc*vn)} (${Math.round(s.acc/ts*100)}%)`).join(' &nbsp;·&nbsp; ');
  box.innerHTML=`Capital suscrito: <strong>Q.${fmt(tSus)}.00</strong> &nbsp;·&nbsp; Capital autorizado: <strong>Q.${fmt(ca)}.00</strong> (${tAut} acciones de Q.${fmt(vn)} c/u)<br><span style="font-size:.75rem">${rows}</span>`;
  renderAdminOpts();
}
function renderAdminOpts(){
  const g=document.getElementById('adm-grp');
  if(!g) return;
  if(!socios.find(s=>s.id===adminId)) adminId=socios[0].id;
  g.innerHTML=socios.map(s=>`
<label class="adm-r ${adminId===s.id?'sel':''}" onclick="setAdmin(${s.id},this)">
  <input type="radio" name="adm" ${adminId===s.id?'checked':''}>
  <span>${s.nombre||'Socio '+s.id}</span>
</label>`).join('');
}
function setAdmin(id,el){
  adminId=id;
  document.querySelectorAll('.adm-r').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

// ── NAVIGATION ─────────────────────────────────────────────────
function renderStep(){
  renderProg();
  const html=[null,s1html,s2html,s3html][step]();
  document.getElementById('steps').innerHTML=html;
  if(step===2) renderSocios();
  if(step===3){ updateCap(); }
}
function nextStep(){if(!validate()) return; saveStep(step); if(step<3){step++;renderStep();}}
function prevStep(){saveStep(step); if(step>1){step--;renderStep();}}
function validate(){
  if(step===1&&!shared&&!document.getElementById('empresa')?.value?.trim()){alert('Ingresá el nombre de la empresa.');return false;}
  if(step===2){for(const s of socios){if(!s.nombre.trim()){alert('Todos los socios necesitan nombre.');return false;}}}
  return true;
}

// ── NUMBERS ────────────────────────────────────────────────────
function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')}
const ONES=['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE'];
const TEENS=['DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
const TENS=['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
const HUND=['','CIEN','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS','SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];
function n2w(n){
  if(n===0)return 'CERO';let r='';
  if(n>=1000000){const m=Math.floor(n/1e6);r+=(m===1?'UN MILLÓN':n2w(m)+' MILLONES')+' ';n%=1e6;}
  if(n>=1000){const k=Math.floor(n/1000);r+=(k===1?'MIL':n2w(k)+' MIL')+' ';n%=1000;}
  if(n>=100){const h=Math.floor(n/100),rest=n%100;r+=(h===1?(rest?'CIENTO':'CIEN'):HUND[h])+' ';n=rest;}
  if(n>=20){const t=Math.floor(n/10);r+=TENS[t];n%=10;if(n)r+=' Y '+ONES[n];}
  else if(n>=10)r+=TEENS[n-10];
  else if(n>0)r+=ONES[n];
  return r.trim();
}
function monto(n){return `${n2w(n)} QUETZALES (Q.${fmt(n)}.00)`}
const DIAS={1:'primero',2:'dos',3:'tres',4:'cuatro',5:'cinco',6:'seis',7:'siete',8:'ocho',9:'nueve',10:'diez',11:'once',12:'doce',13:'trece',14:'catorce',15:'quince',16:'dieciséis',17:'diecisiete',18:'dieciocho',19:'diecinueve',20:'veinte',21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve',30:'treinta',31:'treinta y uno'};

const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function collect(){
  saveStep(step); // capture whatever step is currently visible
  const hoy=new Date();
  return {
    empresa:st.empresa||'[EMPRESA]',
    actAdd:st.actAdd, objCustom:st.objCustom,

// ── TEXT FLOW ──────────────────────────────────────────────────
const LW=95, LPP=43;
// Uppercase letters in Times New Roman ~1.2x wider than lowercase
function wlen(s,bold){let w=0;for(const c of s)w+=/[A-ZÁÉÍÓÚÑÜÀÈÌÒÙÂÊÎÔÛÄËÏÖÜ]/.test(c)?1.2:1;return bold?w*1.3:w;}
function flow(segs){
  const lines=[];
  let cur=[],len=0;
  function pushWord(w,bold){
    const punct=/^[,;:.!?)»–—]/.test(w);
    const gap=len>0&&!punct;
    const add=gap?wlen(w,bold)+1:wlen(w,bold);
    if(len+add<=LW||len===0){
      cur.push({text:(gap?' ':'')+w,bold});len+=add;
    } else {
      // Widow fix: if last word on current line is very short, pull it to the next line
      const last=cur.length>1?cur[cur.length-1]:null;
      const lastW=last?last.text.trim():'';
      if(lastW.length>0&&lastW.length<=4&&!/^[,;:.!?)»–—(«]/.test(lastW)&&wlen(lastW,last.bold)+1+wlen(w,bold)<=LW){
        cur.pop();
        lines.push(cur);
        cur=[{text:lastW,bold:last.bold},{text:' '+w,bold}];
        len=wlen(lastW,last.bold)+1+wlen(w,bold);
      } else {
        lines.push(cur);cur=[{text:w,bold}];len=wlen(w,bold);
      }
    }
  }
  for(const seg of segs){
    const words=seg.text.split(/\s+/).filter(w=>w);
    if(!words.length) continue;
    for(const w of words) pushWord(w,seg.bold);
  }
  if(cur.length) lines.push(cur);
  const pages=[];
  for(let i=0;i<lines.length;i+=LPP) pages.push(lines.slice(i,i+LPP));
  if(!pages.length) pages.push([]);
  return pages;
}

function renderLine(parts){
  if(!parts.length) return '';
  return parts.map(({bold,text})=>{
    const e=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return bold?`<strong>${e}</strong>`:e;
  }).join('');
}

function renderHoja(lines,pi,pt,d,base){
  const serial='A '+String(base+pi-1).padStart(7,'0');
  const reg=280000+base%1000*100+pi*37;
  const rows=Array.from({length:LPP},(_,i)=>{
    const l=lines[i];
    return `<div class="pl"><span class="pln">${i+1}</span><span class="plt">${l?renderLine(l):'&nbsp;'}</span></div>`;
  }).join('');
  return `
<div class="hoja">
  <div class="h-top">
    <div class="h-seal-l">TALLER NACIONAL DE GRABADOS</div>
    <div class="h-sc"><div class="h-sb">
      <span class="h-sb-no">No.</span>
      <span class="h-sn">${serial}</span>
      <span class="h-ss">Taller Nacional de Grabados en Acero · Guatemala, C.A.</span>
    </div></div>
    <div class="h-r">R</div>
  </div>
  <div class="h-pl">
    <span>PROTOCOLO</span>
    <span class="h-pn">${pi}</span>
    <span>de</span>
    <span class="h-pn">${pt}</span>
    <span>hojas</span>
  </div>
  <div class="h-body">
    <div class="h-mg">
      <span class="ml">R E G I S T R O</span>
      <span class="mn">Nº ${reg}</span>
      <div class="mq">QUINQUENIO<br>${d.anno}<br>A ${parseInt(d.anno)+4}</div>
    </div>
    <div class="h-lines">${rows}</div>
  </div>
  <div class="h-sat"><div class="sat-seal"><div class="sat-inner">SAT<br>SUPERTENDENCIA<br>DE<br>ADMINISTRACIÓN<br>TRIBUTARIA</div></div></div>
  ${pi%2===1?`<div class="h-ft">
    <div class="h-sig">
      <img class="h-sig-img" src="${SIG_URI}" alt="firma"><div class="h-sl"></div>
      <div class="h-sn2">${d.notario}</div>
      <div class="h-st">${d.tratoNot==='notario'?'Abogado y Notario Público':'Abogada y Notaria Pública'}</div>
    </div>
  </div>`:`<div class="h-ft-empty"></div>`}
</div>`;
}

// ── GENERATE ───────────────────────────────────────────────────
function generate(){
  if(!validate()) return;
  const d=collect();
  try{
    const ls=JSON.parse(localStorage.getItem('companysim')||'null');
    if(ls){
      const hoy=new Date();
      ls.escritura={
        capSus:d.socios.reduce((a,s)=>a+s.acc*d.vn,0),
        notario:d.notario, numEsc:d.numEsc,
        dia:hoy.getDate(), mesIdx:hoy.getMonth(), anno:hoy.getFullYear().toString(),
        socios:d.socios.map(s=>({nombre:s.nombre,acc:s.acc,cui:s.cui||'',trato:s.trato||'señor'})),
        valNom:d.vn, capAut:d.ca,
        admin:{nombre:d.admin.nombre,trato:d.admin.trato}
      };
      localStorage.setItem('companysim',JSON.stringify(ls));
    }
  }catch(e){}
  const pages=flow(buildSegs(d));
  const base=5200000+Math.floor(Math.random()*300000);
  document.getElementById('pc').innerHTML=pages.map((ls,i)=>renderHoja(ls,i+1,pages.length,d,base)).join('');
  document.getElementById('ptb-t').textContent=`${d.empresa}, S.A.`;
  document.getElementById('ptb-s').textContent=`${pages.length} hojas · ${d.notario}`;
  document.getElementById('layout').style.display='none';
  document.getElementById('pv').style.display='block';
  window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('pv').style.display='none';
  document.getElementById('layout').style.display='flex';
}

// ── INIT ───────────────────────────────────────────────────────
renderStep();
</script>
