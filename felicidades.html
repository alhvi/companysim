<title>¡Empresa Constituida! — CC3115</title>
<link rel="stylesheet" href="style.css">
<style>
.fel-hero{
  text-align:center;padding:2.5rem 1.5rem 2rem;
  background:linear-gradient(135deg,rgba(62,170,110,.12) 0%,rgba(74,158,219,.10) 100%);
  border:1px solid rgba(62,170,110,.25);margin-bottom:1.25rem
}
.fel-icon{font-size:3rem;line-height:1;margin-bottom:.75rem}
.fel-title{font-size:1.6rem;font-weight:800;color:var(--ui-text);margin-bottom:.35rem}
.fel-empresa{font-size:1.05rem;font-weight:700;color:var(--acc);letter-spacing:.04em;margin-bottom:.6rem}
.fel-sub{font-size:.88rem;color:var(--ui-muted);line-height:1.6;max-width:480px;margin:0 auto}

.fel-steps{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
.fel-step{
  display:flex;align-items:flex-start;gap:.8rem;
  background:var(--ui-surface);border:1px solid var(--ui-border);
  padding:.65rem .9rem
}
.fel-check{
  width:1.25rem;height:1.25rem;border-radius:50%;
  background:rgba(62,170,110,.18);border:1.5px solid #3EAA6E;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:.05rem
}
.fel-check::after{content:'✓';font-size:.65rem;font-weight:900;color:#3EAA6E}
.fel-step-name{font-size:.88rem;font-weight:700;color:var(--ui-text)}
.fel-step-desc{font-size:.78rem;color:var(--ui-muted);margin-top:.1rem;line-height:1.4}

.fel-nota{
  background:rgba(74,158,219,.06);border:1px solid rgba(74,158,219,.2);
  padding:.85rem 1rem;font-size:.82rem;color:var(--ui-muted);line-height:1.65;margin-bottom:1.25rem
}
.fel-nota strong{color:var(--ui-text)}

.fel-actions{display:flex;gap:.6rem;flex-wrap:wrap}
</style>

<div id="layout">
  <nav class="sb" id="sb">
    <a class="sb-brand" href="index.html" style="text-decoration:none;display:block">Company<br>Sim</a>
  </nav>
  <div id="fv">
    <div class="fh">
      <div class="ey">CC3115 · Producción y Negocios de Videojuegos</div>
      <h1>Proceso completado</h1>
      <p id="fh-sub"></p>
    </div>

    <div class="fel-hero">
      <div class="fel-icon">🎉</div>
      <div class="fel-title">¡Felicidades!</div>
      <div class="fel-empresa" id="empresa-name">tu empresa</div>
      <div class="fel-sub" id="hero-sub"></div>
    </div>

    <span class="slbl">Documentos generados</span>
    <div class="fel-steps" id="steps"></div>

    <div class="fel-nota" id="nota"></div>

    <div class="fel-actions">
      <a class="btn-g" href="index.html" style="text-decoration:none">← Ver Dashboard</a>
      <button class="btn-g" style="background:var(--ui-surface);color:var(--ui-muted);border:1px solid var(--ui-border)" onclick="if(confirm('¿Borrar todos los datos y empezar de nuevo?')){localStorage.removeItem('companysim');window.location='index.html'}">Reiniciar simulación</button>
    </div>
  </div>
</div>

<script>
const shared=JSON.parse(localStorage.getItem('companysim')||'null');
const tipo=shared?.tipo||'sa';
const nombre=(shared?.nombre||'tu empresa').toUpperCase();

const STEPS_SA=[
  ['Escritura Pública de Constitución','Documento fundacional ante notario — papel protocolo con datos de socios, capital y objeto social'],
  ['Patente de Comercio de Sociedad','Inscripción de la persona jurídica ante el Registro Mercantil de la República'],
  ['Patente de Comercio de Empresa','Inscripción del establecimiento comercial ante el Registro Mercantil'],
  ['Nombramiento de Representante Legal','Inscripción del Administrador Único ante el Registro Mercantil — vigencia 3 años'],
  ['Títulos de Acciones','Certificados de propiedad accionaria emitidos a cada socio'],
  ['Constancia de RTU / SAT','Inscripción tributaria con NIT propio, afiliación a IVA e ISR'],
  ['Autorización de Libros Contables','Habilitación de libros ante la SAT y el Registro Mercantil'],
];
const STEPS_IND=[
  ['Patente de Comercio de Empresa','Inscripción del propietario y el establecimiento ante el Registro Mercantil'],
  ['Constancia de RTU / SAT','Inscripción tributaria — el NIT del propietario es también el NIT de la empresa'],
];

const isSA=tipo==='sa';
const steps=isSA?STEPS_SA:STEPS_IND;
const sfx=isSA?', SOCIEDAD ANÓNIMA':'';
const notaText=isSA
  ?'En la práctica, este proceso toma entre 2 y 6 semanas, involucra honorarios notariales, timbres fiscales, aranceles del RM y la SAT, y requiere gestiones presenciales o digitales ante cada institución.'
  :'En la práctica, este proceso puede completarse en 1 a 2 semanas. Implica aranceles del Registro Mercantil y la inscripción ante la SAT para obtener el NIT.';

document.getElementById('empresa-name').textContent=nombre+sfx;
document.getElementById('fh-sub').textContent=`Resumen de la constitución simulada de tu ${isSA?'Sociedad Anónima':'Empresa Individual de Comercio'}`;
document.getElementById('hero-sub').textContent=`Completaste exitosamente la simulación del proceso de constitución de una ${isSA?'Sociedad Anónima':'Empresa Individual de Comercio'} en Guatemala. Estos son todos los documentos que generaste:`;
document.getElementById('nota').innerHTML=`<strong>Nota sobre el proceso real:</strong> ${notaText} La simulación refleja los documentos reales pero omite costos y tiempos de espera.`;
document.getElementById('steps').innerHTML=steps.map(([name,desc])=>`
  <div class="fel-step">
    <div class="fel-check"></div>
    <div>
      <div class="fel-step-name">${name}</div>
      <div class="fel-step-desc">${desc}</div>
    </div>
  </div>`).join('');

const sb=document.getElementById('sb');
if(isSA){
  sb.innerHTML+=`<div class="sb-section">Fases S.A.</div>
    <div class="sb-item done"><span class="sb-dot"></span>Escritura</div>
    <div class="sb-item done"><span class="sb-dot"></span>Registro RM</div>
    <div class="sb-item done"><span class="sb-dot"></span>Acciones</div>
    <div class="sb-item done"><span class="sb-dot"></span>RTU / SAT</div>
    <div class="sb-item done"><span class="sb-dot"></span>Libros</div>`;
}else{
  sb.innerHTML+=`<div class="sb-section">Fases E.I.</div>
    <div class="sb-item done"><span class="sb-dot"></span>Patente Ind.</div>
    <div class="sb-item done"><span class="sb-dot"></span>RTU / SAT</div>`;
}
</script>
